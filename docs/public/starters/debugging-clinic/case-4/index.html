<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Case 4 — Box overflow</title>
    <link rel="icon" href="../../../favicon.ico">
    <style>
      body { margin: 0; color: #182032; background: #f3eee4; font: 1rem/1.6 system-ui, sans-serif; }
      main { width: min(100% - 2rem, 28rem); margin-inline: auto; padding-block: 4rem; }
      .registration-form { width: 100%; padding-inline: 1rem; border: 4px solid #a93622; background: #fffdf8; }
      label, input { display: block; }
      input { width: 100%; min-height: 2.75rem; margin-block: .4rem 1rem; }
      a { color: #0c625d; }
    </style>
  </head>
  <body>
    <main>
      <p>Case 04 · Narrow the viewport and measure the form's border box.</p>
      <form class="registration-form">
        <h1>Register</h1>
        <label for="case-email">Email</label>
        <input id="case-email" name="email" type="email">
        <button type="submit">Submit</button>
      </form>
      <p><a href="../">Return to all cases</a></p>
    </main>
  </body>
</html>
